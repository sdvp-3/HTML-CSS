<!DOCTYPE html>
<html>
  <head>
    <style>

       .container {
        display: flex;
        height: 300px;
        width: 300px;
        display: inline-block;
        padding: 20px 20px;
        position: relative;
       }

       
       .img {
        position: relative;
        display: inline-block;
        border-radius: 8px;
       }
       .closes {
        position: relative;
        width: 100%;
       
        
       }

       .light-white {
        border-color: black;
        align-items: center;
        justify-content: center;
        background-color: rgba(255, 255, 255, 0.759);
        position: absolute;
        display: flex;
        height: 80px;
        right: 0;
        bottom:0;
        left: 0;
       }
       
       .button {
        padding-left: 5px ;
        padding-right: 5px;
        display: flex;
        height: 35px;
        width: 100px;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: black;
        background-color: white;
        font-family: Arial;
        border-width: 1px ;
        border-color: black;
        border-style: solid;
        border-radius: 2px;
       }

            .button:hover {
             background-color: black;
             color: white;
            cursor: pointer;
             transition: 0.3s;
            }

  


       .text {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: absolute;
        background-color: black;
        height: 30px;
        width: 100px;
        color: white;
        right: 10px;
        top: 10px;
        font-weight: 500;
        font-size: 12px;
       }


          .text:hover {
             background-color: rgb white;
             color: rgb(206, 10, 10);
            cursor: pointer;
             transition: 0.3s;
            }

    </style>
  </head>

  <body>
    
    

       <div class="container">
      <div class="img">
        <img class="closes" src="../imges/img-01.jpeg">
        <div class="text">20% OFF</div>
      </div>
    </div>

    <div class="container">
      <div class="img">
        <img class="closes" src="../imges/img-01.jpeg">
        <div class="text">20% OFF</div>

        <div class="light-white">
            <button class="button">
              Add to Cart
            </button>
        </div>
      </div>
    </div>

    
   
  </body>
</html>
