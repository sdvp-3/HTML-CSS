<!DOCTYPE html>
<html>
  <head>
    <style>
     .div {
      display: inline-block;
      vertical-align: top;
      width: 200px;
      box-shadow:  1px 2px 8px rgba(0, 0, 0, 0.15);
      margin-right: 15px;
      font-family: Arial, sans-serif;
      padding-bottom: 12px;
      border-radius: 4px;
      overflow: hidden;
     background-color: rgb(255, 224, 224);

     }

     .main {
      width: 100%;
      height: 180px;
      object-fit: cover;
      margin-bottom: 5px;
     }

     .name {
      font-family: Arial ,sans-serif;
      font-weight: bold;
      margin-top: 5px;
      margin-bottom: 5px;
      margin-left: 10px;
     }

     .prof-img{
      height: 25px;
      width: 25px;
      border-radius: 50%;
      margin-left: 4px;
     }

     .mutual{
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      margin-left: 6px;
     }
     
     .mutual-text {
      font-family: Arial, sans-serif;
      color: rgb(95, 95, 95);
      text-align: center;
      font-size: 13px;
      margin-top: 5px;
      margin-bottom: 5px;
      margin-left: 10px;
      font-weight: 500;
     }

     .button {
      height: 30px;
      width: 100px;
     margin-left: 10px;
      background-color: rgb(107, 107, 233);
      color: white;
      border: none;
      outline: none;
      border-radius: 4px;
      cursor: pointer;
      
     }


    </style>
  </head>
  <body>
    <div class="div">
   <img class="main-img" src="../05-Assets/img-11.jpeg">
    <p class="name">Oliver</p>
    <div class="mutual">
      <img  class="prof-img" src="05-Assets/img-1.jpeg">
      <span class="mutual-text"> 2 mutual friends</span>
   
    </div>
     <button class="button">
        Add friends
      </button>
    </div>
   
     <div class="div">
   <img class="main-img" src="../05-Assets/img-12.jpeg">
    <p class="name">Oliver</p>
    <div class="mutual">
      <img  class="prof-img" src="../05-Assets/img-1.jpeg">
      <span class="mutual-text"> 3 mutual friends</span>
     
    </div>
     <button class="button">
        Add friends
      </button>
    </div>

     <div class="div">
   <img class="main-img" src="../05-Assets/img-13.jpeg">
    <p class="name">Rex</p>
    <div class="mutual">
      <img  class="prof-img" src="../05-Assets/img-1.jpeg">
      <span class="mutual-text"> 4 mutual friends</span>
       
    </div>
    <button class="button">
        Add friends
      </button>
    </div>
  
  </body>
</html>
