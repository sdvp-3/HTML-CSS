<!DOCTYPE html>
<html>
  <head>
    <style>
      .img {
        vertical-align: middle;
        height: 30px;
        width: 30px;
        border-radius: 25px;
        margin-right: 2PX;
      }

      .text-tweet {
        display: inline-block;
        vertical-align: middle;
        color: rgb(108, 108, 108);

        margin-right: 50px;

      }

        color: white;

        width: 55px;
        border-radius: 20px;
        border: none;
        background-color: rgb(144, 144, 242);
        font-size: 12PX;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
        margin-left: 40PX;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img class ="img" src="img-1.jpeg">
