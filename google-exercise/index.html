<!DOCTYPE html>
<html>
  <head>
    <style>
     .text-big {
      font-size: 80px;
      font-family: Arial, sans-serif;
      font-weight: BOLD;
      text-align: center;
      margin-bottom: 20px;

     }

     .blue {
      color: #4285F4;
     }

     .red {
      color: #EA4335;
     }

     .green {
      color: #FBBC05;
     }

     .purple {
      color: rgb(160, 8, 160);
     }

     .green1 {
      color: green;
     } 

     .red {
      color: red;
     }

     .search-bar{
      border: none;
      height: 40px;
      width: 500px;
      border-radius: 30px;
      box-shadow: 1px 2px 6px rgb(0, 0, 0, 0.15);
     margin: 0 auto;
     display: block;
      outline: none;
      padding-left: 20px;
      
    
     }
    </style>
  </head>
  <body style=" 
   height: 940px;
   width: 940px;">
    <P class="text-big"><span class="blue">G</span><span class="red">o</span><span class="green">o</span><span class="purple">g</span><span class="green1">l</span><span class="red">e</span></P>
    <input class="search-bar" type="text" placeholder="Search Google or Type a URL">
  </body>
</html>
