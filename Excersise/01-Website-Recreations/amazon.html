<!DOCTYPE html>
<html>
  <head>
    <title>Amazon.com</title>
    <style>
       .amazon-site {
        color: rgb(105, 105, 105);
        font-size: 12px;
        height: 20px;
        width:100px;
       }

       .amazon-site:hover {
      color: rgb(1, 90, 1) ;
        transition: 0.4s;
        text-decoration-color:rgb(1, 90, 1) ;
       }

       .nicke{
        font-weight: bold;
       }

       .price {
        font-size: 12px;
        font-weight: bold;
        color: rgb(0,118,0);
       }


       .ecanom {
        font-size: 12px;
       }

       .add-cart {
         color: black;
         background-color: rgb(255,216,20);
         border-radius: 10px;
         border: none;
         font-size: 10px;
         height:20px;
        width: 80px;
        cursor: pointer;
       }

       .add-cart:hover {
        background-color: rgb(253, 175, 59);
        transition: 0.3s;
       }

       .buy-now {
          color: black;
          background-color: rgb(255,164,28);
          border-radius: 10px;
          border: none;
          font-size: 10px;
          height:20px;
         width: 80px;
         cursor: pointer;
       }

       .buy-now:hover {
        background-color:rgb(181, 239, 47);
        transition: 0.3s;
       }
    </style>
  </head>
  <body>
    <a href="https://www.amazon.com/">
        <p class="amazon-site">
          Back to Amazon
          </p>
    </a>
  <p class="nicke">
    Nicke Black Running Shoes
  </p>

  <p class="price">39$-in stock.</p>

  <p class="ecanom">
    Free delivery tommorow.
  </p>

  <button class="add-cart">
    Add to cart
  </button>

  <button class="buy-now">
    Buy Now
  </button>
  </body>
</html>
