<!DOCTYPE html>
<html>
  <head>
    <title>LinkedIn</title>
    <style>
     .registration  {
      height: 30px;
      width: 180px;
      background-color: rgb(127, 47, 201);
      border: none;
      border-radius: 15px;
      font-size: 12px;
      font-width: bold ;
      color:white;
      cursor: pointer;
      
     }

     .registration:hover {
      background-color: rgb(84, 14, 188);
      transition: 0.6s;
     }
     .download {
      height: 30px;
      width:60px;
      background-color: white;
      border-width: 1px;
      border-color: rgb(97, 97, 251);
      color: rgb(83, 83, 238);
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
     }

     .download:hover {
      background-color: rgb(242, 239, 255);
      transition: 0.3s;
      color: rgb(83, 83, 238);
      border-width: 2px;
      
     }
    </style>
  </head>
  <body>
    <Button class="registration">
      Apply on company website
    </Button>

    <button class="download">Save</button>
  </body>
</html>
