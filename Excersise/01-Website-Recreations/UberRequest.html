<!DOCTYPE html>
<html>
  <head>
    <style>
       .request {
        font-family: arial;
        font-size: 30px;
        margin-bottom: 10px;

       }

       .pick-up {
        font-family: arial;
        outline: none;
        border: none;
        background-color: rgb(233, 233, 233);
        height: 35px;
        width: 300px;
        margin-bottom: 5px;
        margin-top: 10px;
        border-radius: 4px;
         padding: 5px 15px;
       }

       .destinition {
        display: block;
         font-family: arial;
        outline: none;
        border: none;
        background-color: rgb(233, 233, 233);
           height: 35px;
        width: 300px;
        margin-top: 5px;
         border-radius: 4px;
         padding: 5px 15px;
       }

       .request-button {
        margin-top: 15px;
        background-color: black;
        color: white;
        font-size: 12px;
        font-family: arial;
        outline: none;
        border: none;
        display: inline-block; 
        vertical-align: middle;
        height: 30px;
        width: 100px;
       }

       .schedule-button{
        margin-top: 15px;
        background-color: rgb(239, 239, 239);
        font-family: arial;
        font-size: 12px;
        border: none;
        margin-left: 10px;
           display: inline-block; 
        vertical-align: middle;
        height: 35px;
        width: 120px;

       }
    </style>
  </head>
  <Body style="
  height: 300px;
  width: 400px; 
 ">
    <p class="request">Request a Ride now</p>
    <input class="pick-up" type="text" placeholder="Enter pick up location">
    <input class="destinition" type=" text" placeholder="Enter destinition">
    <button class="request-button">
      Request now
    </button>
    <button class="schedule-button">
      Schedule for later
    </button>
  </Body>
</html>
