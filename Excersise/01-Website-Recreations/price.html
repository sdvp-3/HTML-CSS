<!DOCTYPE html>
<html>
  <head>
    <Style>
      .price-text {
        font-family: arial;
        margin-bottom: 5px;

      }

      .span-text {
        font-family: arial;
        font-size: 10px;
        color: rgb(84, 96, 84);
        
      }

      .precent-text{
        font-family: arial;
        font-size: 8px;
        color: rgb(2, 146, 2);
        margin-top: 5px;
        margin-bottom: 5px;
      }

      .next-precent {
        font-family: Arial;
        font-size: 8px;
        color:rgb(84, 96, 84);
        margin-top: 5px;
      }
    </Style>
  </head>
  <body>
  <p class="price-text">1,049.61  <span class="span-text">USD</span></p>
    <p class="precent-text">+18.05 (1.75%) today</p>
    <p class="next-precent">After hours 1,048.00-1.61 (0.15%) </p>
  </body>
</html>
