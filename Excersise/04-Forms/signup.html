<!DOCTYPE html>
<html>
  <head>
    <style>
         .name {
          outline: none;
          height: 30px;
          width: 100px;
          font-size: 14px;
          border-radius: 6px;
        border: 1px solid #ccc;
         padding: 5px 15px;
         margin-bottom: 5px;
       
       
          
         }

         .surname {
          outline: none;
          height: 30px;
          width: 100px;
          font-size: 14px;
         border: 1px solid #ccc;
          border-radius: 6px;
            padding: 5px 15px;
            margin-bottom: 5px;
         

         }
         .email {
          outline: none;
          display: block;
          height: 30px;
          width: 235px;
          font-size: 14px;
        border: 1px solid #ccc;
          border-radius: 6px;
            padding: 5px 15px;
            margin-top: 5px;
          border-color:rgb(194, 194, 194);
          margin-bottom: 5px;
           

         }

         .sign-up {
          font-weight: bold;
           display: block;
            height: 40px;
          width: 266px;
          font-size: 14px;
         border: 1px solid #ccc;
          border-radius: 6px;
           text-align: center;
            margin-top: 5px;
            background-color: rgb(112, 112, 249);
            color: white;
            padding: 5px 15px;
            border: none;
            cursor: pointer;
            transition: opacity 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
         }

         .sign-up:hover {
          opacity: 0.8s;
         }
    </style>
  </head>
  <body>
    <input class="name" type="text" placeholder="First Name">
    <input class="surname" type="text" placeholder="Last Name">
    <input class="email" type="text" placeholder=" Email">
    <button class="sign-up">
      Sign Up
    </button>
  </body>
</html>
