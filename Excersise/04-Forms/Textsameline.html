<!DOCTYPE html>
<html>
  <head>
    <style>
      .text {
        display: inline-block;
        vertical-align: middle;
       
        width: 200px;
        margin-right: 20px;
      
      }
      
       .button-text,
        .button-notex{
         vertical-align: middle;
         padding:5px 15px;
         cursor: pointer;
       }
    </style>
  </head>
  <body>
    <p class="text">Thanks for chatting with our
        customer support. Would you
        like to take our quick survey? </p>
<button class="button-text">Yes</button>
<button class="button-notex">No</button>
  </body>
</html>
