<!DOCTYPE html>
<html>
  <head>
    <style>
      .grid-container{
        align-items: center;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr ;
        column-gap: 15px;
        max-width: 600px;
         
      }
   
     .main-zone {
    box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
    width: 180px;
    min-height: 180px; 
    column-gap: 15px;
    overflow: hidden;
    margin-bottom: 5px;
    border-radius: 4px;
     
  }
       
  .cat-name {
    color: rgb(0, 0, 0);
    font-family: Arial,sans-serif;
    font-weight: bold;
    margin-top: 5px;
    margin-bottom: 5px;
    margin-left: 8px;

  }


  .prof-img {
    height: 30px ;
    width: 30px;
    border-radius: 50%;
    align-items: center;

    
  }

   .mutual{
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      margin-top: 5px;
      margin-left: 8px;
  


   }

  .mutual-text {
    color: rgb(110, 109, 109);
    font-family: Arial, sans-serif;
    font-size: 13px;
    text-align: center;
    margin-left: 10px;
    font-weight: 500;
    
   
    
  }
    
  .buttons {
    background-color: rgb(112, 112, 252);
    color: white;
    font-family: Arial, sans-serif;
    height: 35px;
    width: 105px;
    border: none;
    outline: none;
    border-radius: 4px;
    margin-top: 5px;
    margin-bottom: 5px;
    margin-left: 10px;
    
  }

     
    </style>
  
  </head>
  <body>
    <div class="grid-container">
      <div class="main-zone">
      <img class="big-img" src="../05-Assets/img-11.jpeg">
      <p class="cat-name">Oliver</p>
      <div class="mutual">
        <img class="prof-img" src="../05-Assets/img-1.jpeg">
        <span class="mutual-text"> 2 mutual friends</span>
      </div>
      <button class="buttons">
        Add friends
      </button>
    </div>

    <div class="main-zone">
      <img class="big-img" src="../05-Assets/img-12.jpeg">
      <p class="cat-name">Mimi</p>
      <div class="mutual">
        <img class="prof-img" src="../05-Assets/img-1.jpeg">
        <span class="mutual-text"> 3 mutual friends</span>
      </div>
      <button class="buttons">
        Add friends
      </button>
    </div>

    <div class="main-zone">
      <img class="big-img" src="../05-Assets/img-13.jpeg">
      <p class="cat-name">Rex</p>
      <div class="mutual">
        <img class="prof-img" src="../05-Assets/img-1.jpeg">
        <span class="mutual-text"> 4 mutual friends</span>
      </div>
      <button class="buttons">
        Add friends
      </button>
    </div>
    </div>
    
  </body>
</html>
