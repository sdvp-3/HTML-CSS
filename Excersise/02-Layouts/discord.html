<!DOCTYPE html>
<html>
  <head>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

   <style>

    .main-container {
     height: 100vh;
      display: flex;
      position: fixed;
      flex-direction: row;
     
     
    }

     .left-container {
      width: 75px;
      flex: 1;
      display:flex;
      padding-left: 10px;
      padding-right: 10px;
      padding-top: 12px;
      background-color:rgb(24, 24, 24);
    }

    .left-side {
      display:flex;
      padding-top: 10px;
      flex-direction: column;
      padding: 10px 10px;
      align-items: center;
      gap: 10px;
      flex: 1;


    }

    .prof-img {
      height:55px;
      width: 55px;
      border-radius: 50%;

    }


    .right-container {
      display: flex;
      min-width: 200px;
      background-color: rgb(46, 46, 46);
      flex-direction: column;
      padding-top: 10px;
      flex-shrink: 0;
     
      
    

    }


    .right-side {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-left: 15px;
      font-family: roboto , arial;
    
    }

    .right-top {
      display: flex;
      color: white;
      font-family: roboto,arial;
      font-weight: bold;
      padding-left: 15px;
      padding-top: 15px;
      padding-bottom: 5px;
      padding-right: 15px;
    
      
    }

    .material-symbols-outlined {
      display: flex;
      color: rgb(142, 141, 141);
    
    }

    .info {
      display: flex;
      flex: auto;
      
    }

    .right-content {
      display: flex;
      color: rgb(169, 169, 169);
      padding: 5px 10px;
      font-family: roboto,arial;
    }
   </style>
   
  </head>
  <body>
    <div class="main-container">

<div class="left-container">

      <div class="left-side">
       <div> <img class="prof-img" src="../05-Assets/img-11.jpeg"></div>
       <div><img class="prof-img" src="../05-Assets/img-12.jpeg"></div>
       <div><img class="prof-img" src="../05-Assets/img-13.jpeg"></div>
      </div>

      


    </div>

    <div class="right-container">

       <div class="right-side">
        <div class="right-top"> <div class="info"> INFO </div> <span class="material-symbols-outlined">add</span></div>

        <div class="right-content"># New Videos</div>
        <div class="right-content"> # updates</div>
        <div class="right-content"> # faq</div>
      </div>

    </div>
