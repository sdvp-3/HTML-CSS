<!DOCTYPE html>
<html>
<head>
  <style>
    .navbar {
      display: flex;
      background-color: rgb(81, 81, 177);
      padding: 10px 15px;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .logo {
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 16px;
    }

    .search-container {
      flex: 1;
      max-width: 500px;
    }

    .search-bar {
      width: 100%;
      padding: 8px 12px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .download-btn {
      background-color: rgb(81, 81, 177);
      color: white;
      border: 1px solid white;
      padding: 8px 14px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .download-btn:hover {
      background-color: white;
      color: rgb(81, 81, 177);
    }

    .download-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="navbar">

    <div class="logo">Home</div>

    <div class="search-container">
<input class="search-bar" type="text" placeholder="Search">
    </div>

    <button class="download-btn">Download</button>
    
  </div>
</body>
</html>
