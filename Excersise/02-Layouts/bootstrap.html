<!DOCTYPE html>
<html>
  <head>
    <title>Bootstrap Practise</title>
    <style>
    .get-start {
      height: 30px;
      width: 100px;
      background-color: rgb(169, 15, 183);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }

    .get-start:hover {
      background-color: rgb(144, 22, 178);
      transition: 0.4s;
    }

    .download-button {
      height: 30px;
      width: 100px;
      background-color: white;
      color: rgb(86, 86, 86);
      border-color: black;
      border-radius: 4px;
      border-width: 1px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      
    }

    .download-button:hover {
      background-color: gray;
      color: white;
      transition: 0.3s;
    }
    </style>
  </head>
  <body>
    <button class="get-start">
      Get started
    </button>

    <button class="download-button">
      Download
    </button>
  </body>
</html>
