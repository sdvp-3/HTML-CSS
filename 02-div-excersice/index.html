<!DOCTYPE html>
<html>
  <head>
    <style>
     .big-text {
      font-size: 60px;
      text-align: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-weight:500;
      letter-spacing: -8px;
      margin-bottom: 10px;
     }

     .blue {
      color: rgb(127, 127, 221);
      display: inline-block;
      transform: scaleX(1,4);
      transform: scaleY(0.9);
      font-size: 80px;
      font-weight: 600;
      
      
      
     }

     .red {
      color: red;
       
   
   

     }

     .yellow {
      color: rgb(222, 222, 4);
 

     }

     .purple {
      color: rgb(152, 71, 227);
    

     }

     .green {
      color: rgb(8, 179, 8);
   

     }

     .red2 {
      color: red;
      display: inline-block;
      transform: rotate(-20deg);
      
      

     }
      
     .search-resource {
       height: 35px;
       border-radius: 25px;
       width: 500px;
       padding:5px 15px;
       box-shadow: 1px 2px 6px rgb(0, 0, 0, 0.15);
       border: none;
       outline: none;
       margin-top: 10px;
    
       
     }
     
      

     .div-class {
      text-align: center;
      margin-bottom: 35px;

     }

     .div2 {
      text-align: center;
      margin-top: 35px;
     
     

     }

    .button-one {
      height: 35px;
      border: none;
      margin-right: 5px;
      font-weight: 500;
    }

    .button-two {
      height: 35px;
      border: none;
      margin-left: 5px;
        font-weight: 500;
    }
    </style>
  </head>
  <body>
    <p class="big-text">
      <span class="blue">
        G
      </span>
      <span class="red">
        o
      </span>
      <span class="yellow">
        o
      </span>
      <span class="purple">
        g
      </span>
      <span class="green">
        l
      </span>
      <span class="red2">
        e
      </span>
    </p>
   <div class="div-class"><input class="search-resource" type="text" placeholder=" Search Google or type a URL"></div>
    <div class="div2" >
    <button class="button-one">
      Google search
    </button>
     <button class="button-two">
      I'm Felling Lucky
    </button>
    </div>
  </body>
</html>
