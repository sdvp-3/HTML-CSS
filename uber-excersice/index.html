<!DOCTYPE html>
<html>
<head>
  <title>Uber Practise</title>
  <Style>

    .uber {
      background-color: black;
      color: white;
      height: 40px;
      width: 120px;
      font-size: 12px;
      border: none;

    }

    .uber:hover {
      background-color: rgb(48, 48, 48);
      opacity: 1;
      cursor: pointer;
      transition: 0.7s;
    }

    .uber:active {
      opacity: 0.8s;
    }
  </Style>
</head>
<body>
<button class="uber">
  Request Now
</button>
</body>


</html>
